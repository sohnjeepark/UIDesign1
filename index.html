<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Trial Clock</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      color: #d8ffe2;
      font-family: "Courier New", monospace;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #screen {
      position: relative;
      width: 56.25vh;
      height: 100vh;
      max-width: 100vw;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.04) 0px,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px,
          transparent 4px
        ),
        radial-gradient(circle at center, #102018 0%, #020403 70%);
      border-left: 1px solid rgba(216, 255, 226, 0.3);
      border-right: 1px solid rgba(216, 255, 226, 0.3);
      overflow: hidden;
    }

    #screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(216, 255, 226, 0.03);
      animation: flicker 1s infinite;
      pointer-events: none;
    }

    @keyframes flicker {
      0% { opacity: 0.1; }
      50% { opacity: 0.35; }
      100% { opacity: 0.15; }
    }

    #header {
      position: absolute;
      top: 32px;
      left: 28px;
      right: 28px;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 0.12em;
      opacity: 0.8;
    }

    #case-number {
      position: absolute;
      top: 76px;
      left: 28px;
      font-size: 12px;
      letter-spacing: 0.2em;
      opacity: 0.5;
    }

    #text {
      position: absolute;
      left: 36px;
      right: 36px;
      top: 38%;
      transform: translateY(-50%);
      font-size: 22px;
      line-height: 1.65;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(216, 255, 226, 0.45);
      transition: top 0.8s ease, letter-spacing 0.8s ease;
      word-break: keep-all;
    }

    .redacted {
      color: black;
      background: #d8ffe2;
      box-shadow: 0 0 8px rgba(216, 255, 226, 0.6);
    }

    #minute-bar {
      position: absolute;
      left: 28px;
      bottom: 72px;
      height: 2px;
      background: #d8ffe2;
      box-shadow: 0 0 10px rgba(216, 255, 226, 0.9);
      transition: width 0.8s ease;
    }

    #hour-markers {
      position: absolute;
      left: 16px;
      top: 12%;
      bottom: 12%;
      width: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hour-dot {
      width: 4px;
      height: 1px;
      background: rgba(216, 255, 226, 0.25);
    }

    .hour-dot.on {
      width: 8px;
      background: #d8ffe2;
      box-shadow: 0 0 8px #d8ffe2;
    }

    #cursor {
      position: absolute;
      right: 30px;
      bottom: 28px;
      font-size: 22px;
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    .noise {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #d8ffe2;
      opacity: 0.45;
    }
  </style>
</head>

<body>
  <div id="screen">
    <div id="header">
      <span>CASE FILE</span>
      <span>UNDER REVIEW</span>
    </div>

    <div id="case-number">JOSEF K. / UNVERIFIED RECORD</div>

    <div id="hour-markers"></div>

    <div id="text"></div>

    <div id="minute-bar"></div>

    <div id="cursor">_</div>
  </div>

  <script>
    const screen = document.querySelector("#screen")
    const text = document.querySelector("#text")
    const minuteBar = document.querySelector("#minute-bar")
    const hourMarkers = document.querySelector("#hour-markers")

    const originalText =
      "SOMEONE MUST HAVE SPOKEN AGAINST JOSEF K.\n" +
      "WITHOUT KNOWING THE CHARGE,\n" +
      "HE ENTERED THE MORNING AS AN ACCUSED MAN."

      let randomOrder = []
let lastMinute = -1

function makeRandomOrder() {
  randomOrder = []

  for (let i = 0; i < originalText.length; i = i + 1) {
    const character = originalText[i]

    if (character !== " " && character !== "\n") {
      randomOrder.push(i)
    }
  }

  for (let i = randomOrder.length - 1; i > 0; i = i - 1) {
    const randomIndex = Math.floor(Math.random() * (i + 1))
    const temp = randomOrder[i]
    randomOrder[i] = randomOrder[randomIndex]
    randomOrder[randomIndex] = temp
  }
}

for (let i = 0; i < 24; i = i + 1) {
  hourMarkers.innerHTML = hourMarkers.innerHTML + "<div class='hour-dot'></div>"
}
    const dots = document.querySelectorAll(".hour-dot")

    function updateClock() {
      const now = new Date()

      const hour = now.getHours()
      const minute = now.getMinutes()
      const second = now.getSeconds()

      if (minute !== lastMinute) {
  makeRandomOrder()
  lastMinute = minute
}

const hiddenCount = second
const hiddenLetters = randomOrder.slice(0, hiddenCount)

let result = ""

for (let i = 0; i < originalText.length; i = i + 1) {
  const character = originalText[i]

  if (character === "\n") {
    result = result + "<br>"
  } else if (character === " ") {
    result = result + " "
  } else if (hiddenLetters.includes(i)) {
    result = result + "<span class='redacted'>█</span>"
  } else {
    result = result + character
  }
}

text.innerHTML = result



      const textTop = 22 + hour * 56 / 23
      text.style.top = textTop + "%"

      const spacing = 0.03 + minute * 0.018
      text.style.letterSpacing = spacing + "em"

      const barWidth = 8 + minute * 80 / 59
      minuteBar.style.width = barWidth + "%"

      for (let i = 0; i < dots.length; i = i + 1) {
        if (i === hour) {
          dots[i].className = "hour-dot on"
        } else {
          dots[i].className = "hour-dot"
        }
      }

      makeNoise()
    }

    function makeNoise() {
      const noise = document.createElement("div")
      noise.className = "noise"

      noise.style.left = Math.random() * 100 + "%"
      noise.style.top = Math.random() * 100 + "%"

      screen.appendChild(noise)

      setTimeout(function() {
        noise.remove()
      }, 1000)
    }

    updateClock()
    setInterval(updateClock, 1000)
  </script>
</body>
</html>
