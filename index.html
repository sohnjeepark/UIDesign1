<!DOCTYPE html>
<html lang="ko">

<head>
  <title>Sohnjee Park | UI Design Programming 1</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>

  <div class="cursor"></div>

  <main class="page">

    <section class="hero">
      <p class="small-text">UI Design Programming 1</p>

      <h1 class="main-title">
        <span>Sohnjee</span>
        <span>Park</span>
      </h1>

      <p class="desc">
        A personal website that reacts to movement, type, rhythm, and mood.
      </p>
    </section>

    <section class="info">
      <div class="card">
        <p class="label">Favorite Food</p>
        <h2>Lasagna</h2>
      </div>

      <div class="card">
        <p class="label">Favorite Song</p>
        <h2>Alive<br>by Pearl Jam</h2>
      </div>

      <div class="card">
        <p class="label">Favorite Website</p>
        <h2>
          <a href="https://www.nytimes.com" target="_blank">Wplace</a>
        </h2>
      </div>
    </section>

    <section class="interactive-section">
      <p class="small-text">Move your mouse</p>

      <div class="type-box">
        <p class="interactive-type">TYPE</p>
        <p class="interactive-type outline">MOVES</p>
        <p class="interactive-type">WITH YOU</p>
      </div>
    </section>

  </main>

  <script src="assets/script.js"></script>
</body>

</html>
