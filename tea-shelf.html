      <div>
        <p class="sub-label">Code My Shelf / 09</p>
        <h1 class="sub-title">Tea Shelf</h1>
      </div>
    </header>

<section class="tea-shelf-page">

  <div class="tea-display">

    <div class="tea-shelf">

    <div class="shelf-row">

<button class="tea-photo-tin haute tea-item">
  <img class="tea-photo" src="assets/tea/haute.png" alt="Haute Couture Tea">

  <span class="tea-info-card">
    <span class="tea-card-label">Selected Tea</span>
    <strong>Haute Couture Tea</strong>
    <em>Black Tea</em>
    <span>An elixir, a perfume, a savour which perfectly expresses the beauty of a fleeting moment, an expression of the beyond. This black tea is carefully blended with sweet notes of caramel and rose to create a cup of eternity. A tea just for you.</span>
  </span>
</button>

        <button class="tea-photo-tin french tea-item">
          <img class="tea-photo" src="assets/tea/french.png" alt="French Earl Grey Tea">

          <span class="tea-info-card">
            <span class="tea-card-label">Selected Tea</span>
            <strong>French Earl Grey</strong>
            <em>Black Tea</em>
            <span>A fragrant variation of the great classic, this TWG Tea black tea has been delicately infused with citrus fruits and French blue cornflowers.</span>
          </span>
        </button>

        <button class="tea-photo-tin napoleon tea-item">
          <img class="tea-photo" src="assets/tea/napoleon.png" alt="Napoleon Tea">
          <span class="tea-info-card">
            <span class="tea-card-label">Selected Tea</span>
            <strong>Napoleon Tea</strong>
            <em>Black Tea</em>
            <span>This tea of destiny combines a high quality black tea with a sophisticated TWG Tea blend of sweet French spices with a hint of vanilla, giving a most extraordinary and fully developed aroma. A tea of sensual warmth and sweetness.</span>
          </span>
        </button>

        <button class="tea-photo-tin emperor tea-item">
          <img class="tea-photo" src="assets/tea/emperor.png" alt="Emperor Pu-Erh Tea">
          <span class="tea-info-card">
            <span class="tea-card-label">Selected Tea</span>
            <strong>Emperor Pu-Erh Tea</strong>
            <em>Matured Tea / Pu-Erh</em>
            <span>Recognised for its medicinal qualities, this TWG matured tea yields a strong and earthy fragrance, with a warm taste of terroir. A perfect post-meal tea.</span>
          </span>
        </button>

      </div>



  <div class="shelf-row">
    <button class="tea-photo-tin blacktea tea-item">
      <img class="tea-photo" src="assets/tea/blacktea.png" alt="Black Tea 1837">
      <span class="tea-info-card">
        <span class="tea-card-label">Selected Tea</span>
        <strong>Black Tea 1837</strong>
        <em>Black Tea</em>
        <span>TWG Tea's renowned signature tea, 1837 Black is a unique blend of black tea with notes of fruits and flowers from the Bermuda triangle which leaves a lingering aftertaste of ripe berries, anise, and caramel. A timeless classic.</span>
      </span>
    </button>

    <button class="tea-photo-tin english tea-item">
      <img class="tea-photo" src="assets/tea/english.png" alt="English Breakfast Tea">
      <span class="tea-info-card">
        <span class="tea-card-label">Selected Tea</span>
        <strong>English Breakfast Tea</strong>
        <em>Black Tea</em>
        <span>This classic was originally blended as an accompaniment to the traditional English breakfast. Very strong and full-bodied with light floral undertones, this TWG broken-leaf black tea is perfect with morning toast and marmalade.</span>
      </span>
    </button>

    <button class="tea-photo-tin red tea-item">
      <img class="tea-photo" src="assets/tea/red.png" alt="Red Balloon Tea">
      <span class="tea-info-card">
        <span class="tea-card-label">Selected Tea</span>
        <strong>Red Balloon Tea</strong>
        <em>Green Tea</em>
        <span>A magical flight of the imagination, this tea is the perfect confection to brighten your day. Japanese kukicha lends its round and nutty flavour to exquisite notes of tree-ripe peaches, lending a hint of sweetness to this airy, green tea which sparkles with overtones of delicate petals of pink rose. Fly high with this delightful ode to youth and innocence, the perfect blend to celebrate.</span>
      </span>
    </button>

    <button class="tea-photo-tin teaparty tea-item">
      <img class="tea-photo" src="assets/tea/teaparty.png" alt="Tea Party Tea">
      <span class="tea-info-card">
        <span class="tea-card-label">Selected Tea</span>
        <strong>Tea Party Tea</strong>
        <em>Herbal Tea</em>
        <span>Surrender to the rich, warm and golden infusion of this black tea inflected with notes of pineapple and Mediterranean orange that infuses into a cup of orchard sweetness. A perfect blend to pair with tea cakes and sandwiches</span>
      </span>
    </button>
  </div>


  <div class="shelf-row">
    <button class="tea-photo-tin ritz tea-item">
      <img class="tea-photo" src="assets/tea/ritz.png" alt="L'Hiver au Ritz Tea">
      <span class="tea-info-card">
        <span class="tea-card-label">Selected Tea</span>
        <strong>L'Hiver au Ritz Tea</strong>
        <em>Black Tea</em>
        <span>Ripe berries lend their malty sweetness to this blend of black tea accented by notes of rich vanilla and warm spice. A winter's delight.</span>
      </span>
    </button>

    <button class="tea-photo-tin vendome tea-item">
      <img class="tea-photo" src="assets/tea/vendome.png" alt="Vendôme Tea">
      <span class="tea-info-card">
        <span class="tea-card-label">Selected Tea</span>
        <strong>Vendôme Tea</strong>
        <em>Black Tea</em>
        <span>Delicate theine-free red tea from South Africa blended with sweet spices and notes of rare citrus. The perfect nightcap.</span>
      </span>
    </button>
  </div>



          <div class="tea-pot-small">
            <div class="mini-pot-body"></div>
            <div class="mini-pot-lid"></div>
            <div class="mini-pot-spout"></div>
            <div class="mini-pot-handle"></div>
          </div>

          

      </div>
