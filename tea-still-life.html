<!DOCTYPE html>
<html lang="ko">
<head>
  <title>CSS Tea Still Life | Sohnjee Park</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>

  <button class="theme-toggle" id="themeToggle">Dark</button>

  <aside class="side-nav">
  <div class="logo">
    <span>S</span>
    <i></i>
    <span>P</span>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#works" class="active">Works</a>
    <a href="index.html#library">Library</a>
    <a href="index.html#media">Album</a>
  </nav>

  <p class="copyright">© 2026<br>Sohnjee Park</p>
</aside>

  <main class="site-main">
  <div class="page ascii-page">

    <header class="sub-hero">
      <a class="back" href="index.html">← Back</a>

      <div>
        <p class="sub-label">CSS Still Life / 08</p>
        <h1 class="sub-title">Tea Still Life</h1>
      </div>
    </header>

<section class="still-life-page">

        <button class="photo-toggle" id="photoToggle">
            Click to see original photo
        </button>

        <div class="still-life-wrap">

            <div class="still-life" id="stillLife">
      

        <div class="back-person">
          <div class="shirt"></div>
          <div class="arm arm-left"></div>
          <div class="arm arm-right"></div>
        </div>

        <div class="wall-line"></div>

        <div class="stand">
          <div class="handle-top"></div>
          <div class="stand-left"></div>
          <div class="stand-right"></div>
          <div class="hook"></div>
        </div>

        <div class="top-plate plate">
          <div class="plate-ring"></div>
          <div class="cake">
            <div class="cream"></div>
            <div class="gold gold-1"></div>
            <div class="gold gold-2"></div>
          </div>
        </div>

        <div class="bottom-plate plate">
          <div class="plate-ring"></div>

          <div class="jam jam-1"></div>
          <div class="jam jam-2"></div>

          <div class="small-dessert dessert-1"></div>
          <div class="small-dessert dessert-2"></div>
          <div class="small-dessert dessert-3"></div>
        </div>

        <div class="teapot">
          <div class="pot-body"></div>
          <div class="pot-lid"></div>
          <div class="pot-spout"></div>
          <div class="pot-handle"></div>
          <div class="pot-foot foot-1"></div>
          <div class="pot-foot foot-2"></div>
        </div>

        <div class="iced-tea">
          <div class="glass-bowl"></div>
          <div class="tea-color"></div>
          <div class="ice ice-1"></div>
          <div class="ice ice-2"></div>
          <div class="ice ice-3"></div>
          <div class="straw"></div>
          <div class="glass-stem"></div>
          <div class="glass-foot"></div>
        </div>

        <div class="front-plate">
          <div class="twg-logo">TWG</div>
          <div class="napkin"></div>
        </div>

                <div class="fork">
          <div class="fork-head"></div>
          <div class="fork-handle"></div>
        </div>

      </div>

      <img
        class="original-photo"
        id="originalPhoto"
        src="assets/images/tea-original.jpg"
        alt="Original tea still life photo"
      >

  </div>

</section>


</div>
  </main>

  <script src="assets/script.js"></script>
</body>
</html>
